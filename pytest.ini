[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary for failures, errors, skips
addopts =
    -ra
    --strict-markers
    --tb=short

markers =
    slow: tests that take more than a second (deselect with '-m "not slow"')
    integration: end-to-end tests using FastAPI TestClient
